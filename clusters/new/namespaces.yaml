---
apiVersion: v1
kind: Namespace
metadata:
  name: new-hola
---
apiVersion: v1
kind: Namespace
metadata:
  name: new-hola2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-webapp-blue
  namespace: new-hola
spec:
  replicas: 3
  selector:
    matchLabels:
      app: simple-webapp-blue
  template:
    metadata:
      labels:
        app: simple-webapp-blue
    spec:
      containers:
        - image: "ubuntu:jammy"
          command:
            - "sleep"
            - "604800"
          name: simple-webapp-blue
